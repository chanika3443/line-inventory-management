<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f5f5f7">
  <base target="_top">
  <title>ระบบคลังวัสดุ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    /* Loading screen */
    #loading {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0,122,255,0.2);
      border-top-color: #007aff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading">
    <div class="spinner"></div>
  </div>
  
  <!-- Main App -->
  <iframe 
    id="appFrame"
    src=""
    allow="clipboard-write"
    sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation allow-top-navigation-by-user-activation"
    loading="eager">
  </iframe>

  <script>
    // Get base URL
    var baseUrl = 'https://script.google.com/macros/s/AKfycbx485xIyUla9r78h6rxgwbr0JHlCt4skYjsXdxwPgHwjjwshVqhYI9OOVWY9fjVpYT0/exec';
    
    // Parse URL parameters including LIFF state
    function getTargetUrl() {
      var params = new URLSearchParams(window.location.search);
      var hash = window.location.hash;
      
      // Check for liff.state parameter
      var liffState = params.get('liff.state');
      if (liffState) {
        // Decode liff.state (it contains the actual page parameter)
        var stateParams = new URLSearchParams(liffState);
        var page = stateParams.get('page');
        if (page) {
          return baseUrl + '?page=' + page;
        }
      }
      
      // Check for direct page parameter
      var page = params.get('page');
      if (page) {
        return baseUrl + '?page=' + page;
      }
      
      // Check hash
      if (hash && hash.length > 1) {
        var hashPage = hash.substring(1);
        if (hashPage.indexOf('page=') === 0) {
          return baseUrl + '?' + hashPage;
        }
        return baseUrl + '?page=' + hashPage;
      }
      
      // Default to home
      return baseUrl;
    }
    
    // Set iframe src
    var iframe = document.getElementById('appFrame');
    var loading = document.getElementById('loading');
    iframe.src = getTargetUrl();
    
    // Hide loading when iframe loads
    iframe.addEventListener('load', function() {
      setTimeout(function() {
        loading.classList.add('hidden');
      }, 300);
    });
    
    // Timeout fallback (hide loading after 5 seconds even if not loaded)
    setTimeout(function() {
      loading.classList.add('hidden');
    }, 5000);
    
    // Handle iframe errors
    iframe.addEventListener('error', function() {
      loading.innerHTML = '<div style="text-align: center; color: #ff3b30;"><div style="font-size: 48px; margin-bottom: 16px;">⚠️</div><div style="font-size: 16px; font-weight: 600;">ไม่สามารถโหลดแอปได้</div><div style="font-size: 14px; color: #86868b; margin-top: 8px;">กรุณาลองใหม่อีกครั้ง</div></div>';
    });
    
    // Listen for URL changes from parent (LIFF navigation)
    window.addEventListener('message', function(event) {
      // Security check
      if (event.origin !== window.location.origin) return;
      
      if (event.data && event.data.type === 'navigate') {
        iframe.src = baseUrl + '?page=' + event.data.page;
      }
    });
  </script>
</body>
</html>
