<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f5f5f7">
  <title>ระบบคลังวัสดุ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    /* Loading screen */
    #loading {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #f5f5f7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0,122,255,0.2);
      border-top-color: #007aff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      margin-top: 16px;
      color: #1d1d1f;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">กำลังโหลด...</div>
  </div>

  <script>
    // Redirect to Google Apps Script with hash converted to page parameter
    var baseUrl = 'https://script.google.com/macros/s/AKfycbx485xIyUla9r78h6rxgwbr0JHlCt4skYjsXdxwPgHwjjwshVqhYI9OOVWY9fjVpYT0/exec';
    
    function getTargetUrl() {
      var params = new URLSearchParams(window.location.search);
      var hash = window.location.hash;
      
      // Check liff.state first
      var liffState = params.get('liff.state');
      if (liffState) {
        try {
          var decoded = decodeURIComponent(liffState);
          // If it's a hash like #products
          if (decoded.indexOf('#') === 0) {
            var page = decoded.substring(1);
            return baseUrl + '?page=' + page;
          }
        } catch (e) {
          console.error('Error decoding liff.state:', e);
        }
      }
      
      // Check hash
      if (hash && hash.length > 1) {
        var page = hash.substring(1); // Remove #
        var validPages = ['products', 'withdraw', 'receive', 'reports', 'dashboard', 'logs'];
        if (validPages.indexOf(page) !== -1) {
          return baseUrl + '?page=' + page;
        }
      }
      
      // Check page parameter
      var page = params.get('page');
      if (page) {
        return baseUrl + '?page=' + page;
      }
      
      // Default to home
      return baseUrl;
    }
    
    // Redirect immediately
    var targetUrl = getTargetUrl();
    console.log('Redirecting to:', targetUrl);
    window.location.replace(targetUrl);
  </script>
</body>
</html>
