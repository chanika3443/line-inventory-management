<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f5f5f7">
  <base target="_top">
  <title>ระบบคลังวัสดุ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    /* Loading screen */
    #loading {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #f5f5f7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0,122,255,0.2);
      border-top-color: #007aff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading">
    <div class="spinner"></div>
  </div>
  
  <!-- Main App -->
  <iframe 
    id="appFrame"
    src=""
    allow="clipboard-write"
    sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation allow-top-navigation-by-user-activation"
    loading="eager">
  </iframe>

  <script>
    // Get base URL
    var baseUrl = 'https://script.google.com/macros/s/AKfycbx485xIyUla9r78h6rxgwbr0JHlCt4skYjsXdxwPgHwjjwshVqhYI9OOVWY9fjVpYT0/exec';
    
    // Parse URL to get page parameter
    function getTargetUrl() {
      var fullUrl = window.location.href;
      console.log('=== URL PARSING ===');
      console.log('Full URL:', fullUrl);
      
      // Method 1: Check LIFF state parameter first
      var params = new URLSearchParams(window.location.search);
      var liffState = params.get('liff.state');
      
      if (liffState) {
        console.log('liff.state (raw):', liffState);
        
        try {
          // Decode liff.state
          var decoded = decodeURIComponent(liffState);
          console.log('liff.state (decoded):', decoded);
          
          // Check if it's a hash (#products)
          if (decoded.indexOf('#') === 0) {
            var page = decoded.substring(1); // Remove #
            console.log('✓ Found page in liff.state hash:', page);
            var targetUrl = baseUrl + '?page=' + page;
            console.log('Target URL:', targetUrl);
            return targetUrl;
          }
          
          // Check if it contains page= parameter
          if (decoded.indexOf('page=') !== -1) {
            var match = decoded.match(/page=([^&]+)/);
            if (match) {
              console.log('✓ Found page in liff.state param:', match[1]);
              var targetUrl = baseUrl + '?page=' + match[1];
              console.log('Target URL:', targetUrl);
              return targetUrl;
            }
          }
          
          // Check if it's just a page name
          var validPages = ['products', 'withdraw', 'receive', 'reports', 'dashboard', 'logs'];
          if (validPages.indexOf(decoded) !== -1) {
            console.log('✓ Found valid page name in liff.state:', decoded);
            var targetUrl = baseUrl + '?page=' + decoded;
            console.log('Target URL:', targetUrl);
            return targetUrl;
          }
        } catch (e) {
          console.error('Error decoding liff.state:', e);
        }
      }
      
      // Method 2: Check hash (#products)
      var hash = window.location.hash;
      if (hash && hash.length > 1) {
        var hashContent = hash.substring(1); // Remove #
        console.log('Hash content:', hashContent);
        
        // Direct page name: #products
        var validPages = ['products', 'withdraw', 'receive', 'reports', 'dashboard', 'logs'];
        if (validPages.indexOf(hashContent) !== -1) {
          console.log('✓ Found page in hash:', hashContent);
          var targetUrl = baseUrl + '?page=' + hashContent;
          console.log('Target URL:', targetUrl);
          return targetUrl;
        }
        
        // Hash with params: #page=products
        if (hashContent.indexOf('page=') !== -1) {
          var match = hashContent.match(/page=([^&]+)/);
          if (match) {
            console.log('✓ Found page param in hash:', match[1]);
            var targetUrl = baseUrl + '?page=' + match[1];
            console.log('Target URL:', targetUrl);
            return targetUrl;
          }
        }
      }
      
      // Method 3: Check direct page parameter
      var page = params.get('page');
      if (page) {
        console.log('✓ Found page in query:', page);
        var targetUrl = baseUrl + '?page=' + page;
        console.log('Target URL:', targetUrl);
        return targetUrl;
      }
      
      // Method 4: Parse entire URL for page parameter
      if (fullUrl.indexOf('page=') !== -1) {
        var match = fullUrl.match(/[?&#]page=([^&]+)/);
        if (match) {
          console.log('✓ Found page in URL:', match[1]);
          var targetUrl = baseUrl + '?page=' + match[1];
          console.log('Target URL:', targetUrl);
          return targetUrl;
        }
      }
      
      // Default to home
      console.log('→ Loading home (no page found)');
      return baseUrl;
    }
    
    // Set iframe src with cache busting
    var iframe = document.getElementById('appFrame');
    var loading = document.getElementById('loading');
    var targetUrl = getTargetUrl();
    console.log('=== LOADING IFRAME ===');
    console.log('Final Target URL:', targetUrl);
    
    // Add timestamp to prevent caching (replace old timestamp if exists)
    var cleanUrl = targetUrl.replace(/[&?]_t=\d+/, '');
    var separator = cleanUrl.indexOf('?') !== -1 ? '&' : '?';
    iframe.src = cleanUrl + separator + '_t=' + Date.now();
    
    // Hide loading when iframe loads
    iframe.addEventListener('load', function() {
      console.log('Iframe loaded successfully');
      setTimeout(function() {
        loading.classList.add('hidden');
      }, 300);
    });
    
    // Timeout fallback
    setTimeout(function() {
      loading.classList.add('hidden');
    }, 5000);
    
    // Handle iframe errors
    iframe.addEventListener('error', function() {
      console.error('Iframe failed to load');
      loading.innerHTML = '<div style="text-align: center; color: #ff3b30;"><div style="font-size: 48px; margin-bottom: 16px;">⚠️</div><div style="font-size: 16px; font-weight: 600;">ไม่สามารถโหลดแอปได้</div><div style="font-size: 14px; color: #86868b; margin-top: 8px;">กรุณาลองใหม่อีกครั้ง</div></div>';
    });
    
    // Listen for hash changes (IMPORTANT: This makes navigation work!)
    window.addEventListener('hashchange', function() {
      console.log('=== HASH CHANGED ===');
      console.log('New hash:', window.location.hash);
      var newUrl = getTargetUrl();
      console.log('Reloading iframe with:', newUrl);
      
      // Add timestamp to force reload (replace old timestamp if exists)
      var cleanUrl = newUrl.replace(/[&?]_t=\d+/, '');
      var separator = cleanUrl.indexOf('?') !== -1 ? '&' : '?';
      iframe.src = cleanUrl + separator + '_t=' + Date.now();
      
      loading.classList.remove('hidden');
      setTimeout(function() {
        loading.classList.add('hidden');
      }, 1000);
    });
    
    // Also listen for URL parameter changes (when LIFF redirects)
    var lastUrl = window.location.href;
    setInterval(function() {
      if (window.location.href !== lastUrl) {
        lastUrl = window.location.href;
        console.log('=== URL CHANGED ===');
        console.log('New URL:', lastUrl);
        var newUrl = getTargetUrl();
        console.log('Reloading iframe with:', newUrl);
        
        // Add timestamp to force reload (replace old timestamp if exists)
        var cleanUrl = newUrl.replace(/[&?]_t=\d+/, '');
        var separator = cleanUrl.indexOf('?') !== -1 ? '&' : '?';
        iframe.src = cleanUrl + separator + '_t=' + Date.now();
        
        loading.classList.remove('hidden');
        setTimeout(function() {
          loading.classList.add('hidden');
        }, 1000);
      }
    }, 500);
  </script>
</body>
</html>
